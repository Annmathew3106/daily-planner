<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Routine</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="create.css">
</head>

<body>

    <nav>
        <ul>
            <li><a href="index.html">HOME</a></li>
            <li><a href="progress.html">PROGRESS</a></li>
            <li><a href="level.html">LEVEL</a></li>
            <li><a href="dailyroutine.html">DAILY ROUTINE</a></li>
            <li><a href="about.html">ABOUT</a></li>
        </ul>
    </nav>

    <form class="form">
        <a class="close-btn" href="dailyroutine.html" aria-label="Close">&times;</a>

        <h2><span class="page-icon" aria-hidden="true">&#9998;</span>Create Daily Routine</h2>

        <div class="field">
            <label for="title">Routine Title</label>
            <input type="text" id="title" placeholder="e.g. Weekend Routine" required>
        </div>

        <div class="subjects-header">
            <div class="subjects-title-wrap">
                <label for="routine-task-1">Add Tasks</label>
                <p class="hint hint-inline"><strong>Time is optional.</strong> Leave time empty to keep a task flexible.</p>
            </div>
            <div class="header-actions">
                <button type="reset" class="button clear-btn">Clear All</button>
                <button type="button" class="button add-btn">&#10133; Add Task</button>
            </div>
        </div>

        <div class="subjects" aria-live="polite">
            <div class="subject-group" data-required="true">
                <input type="text" id="routine-task-1" name="tasks[]" placeholder="Add your task" required>
                <div class="time-field">
                    <input type="time" name="times[]" aria-label="Task time (optional)">
                    <span class="time-optional-badge">Optional</span>
                </div>
                <button type="button" class="remove-btn" aria-label="Remove task">Remove</button>
            </div>
        </div>

        <button type="submit" class="button primary">&#128190; Save Routine</button>
    </form>

    <template id="task-template">
        <div class="subject-group">
            <input type="text" name="tasks[]" placeholder="Add task">
            <div class="time-field">
                <input type="time" name="times[]" aria-label="Task time (optional)">
                <span class="time-optional-badge">Optional</span>
            </div>
            <button type="button" class="remove-btn" aria-label="Remove task">Remove</button>
        </div>
    </template>

    <script src="dailyroutinecreate.js"></script>
</body>

</html>
