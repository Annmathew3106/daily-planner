<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CREATE</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="create.css">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='bg' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%23ee8c3f'/%3E%3Cstop offset='100%25' stop-color='%23cf6c23'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='16' fill='url(%23bg)'/%3E%3Crect x='14' y='14' width='36' height='36' rx='8' fill='white' fill-opacity='0.97'/%3E%3Crect x='21' y='11' width='4' height='10' rx='2' fill='white'/%3E%3Crect x='39' y='11' width='4' height='10' rx='2' fill='white'/%3E%3Crect x='20' y='24' width='24' height='4' rx='2' fill='%23ee8c3f'/%3E%3Crect x='20' y='32' width='18' height='4' rx='2' fill='%23f5b27a'/%3E%3Cpath d='M26 42l4 4 9-10' fill='none' stroke='%236b5646' stroke-width='4' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
</head>

<body>
    <nav>
        <ul>
            <li><a href="index.html">HOME</a></li>
            <li><a href="progress.html">PROGRESS</a></li>
            <li><a href="level.html">LEVEL</a></li>
            <li><a href="dailyroutine.html">DAILY ROUTINE</a></li>
            <li><a href="about.html">ABOUT</a></li>
        </ul>
    </nav>

    <form class="form">
        <a class="close-btn" href="index.html" aria-label="Close">&times;</a>
        <h2><span class="page-icon" aria-hidden="true">&#9998;</span>Create Your Daily Plan</h2>

        <div class="field">
            <label for="date">Date</label>
            <input type="date" id="date" name="date" required>
        </div>

        <div class="subjects-header">
            <label>Add Your Plan</label>
            <div class="header-actions">
                <button type="reset" class="button clear-btn">Clear All</button>
                <button type="button" class="button add-btn">&#10133; Add Plan</button>
            </div>
        </div>
        <div class="subjects" aria-live="polite">
            <div class="subject-group" data-required="true">
                <input type="text" name="plans[]" placeholder="Add your plan" required>
                <input type="time" name="times[]" aria-label="Plan time">
                <button type="button" class="remove-btn" aria-label="Remove plan">Remove</button>
            </div>
        </div>
        <p class="hint">Add one plan per row for classes, assignments, routines, or reminders.</p>

        <button type="submit" class="button primary">&#128190; Save Plan</button>
    </form>

    <template id="subject-template">
        <div class="subject-group">
            <input type="text" name="plans[]" placeholder="Add your plan">
            <input type="time" name="times[]" aria-label="Plan time">
            <button type="button" class="remove-btn" aria-label="Remove plan">Remove</button>
        </div>
    </template>

    <script src="create.js"></script>
</body>

</html>
