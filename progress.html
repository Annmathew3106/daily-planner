<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="progress.css">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='bg' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%23ee8c3f'/%3E%3Cstop offset='100%25' stop-color='%23cf6c23'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='16' fill='url(%23bg)'/%3E%3Crect x='14' y='14' width='36' height='36' rx='8' fill='white' fill-opacity='0.97'/%3E%3Crect x='21' y='11' width='4' height='10' rx='2' fill='white'/%3E%3Crect x='39' y='11' width='4' height='10' rx='2' fill='white'/%3E%3Crect x='20' y='24' width='24' height='4' rx='2' fill='%23ee8c3f'/%3E%3Crect x='20' y='32' width='18' height='4' rx='2' fill='%23f5b27a'/%3E%3Cpath d='M26 42l4 4 9-10' fill='none' stroke='%236b5646' stroke-width='4' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
</head>

<body>
    <nav>
        <ul>
            <li><a href="index.html">HOME</a></li>
            <li><a href="progress.html" class="active">PROGRESS</a></li>
            <li><a href="level.html">LEVEL</a></li>
            <li><a href="about.html">ABOUT</a></li>
        </ul>
    </nav>

    <div class="content">
        <div class="header-row">
            <h1><span class="page-icon" aria-hidden="true">&#128200;</span>Progress</h1>
        </div>
        <h2><span class="subtitle-icon" aria-hidden="true">&#10022;</span>Track your daily consistency</h2>

        <div id="panel-current" class="progress-card">
            <div class="progress-header">
                <div class="progress-copy">
                    <h3><span class="section-icon" aria-hidden="true">&#9684;</span>Your Progress</h3>
                    <p class="progress-subtitle">Shows how many daily tasks you completed over time.</p>
                </div>
                <div class="select-wrap">
                    <label for="range" class="sr-only">Range</label>
                    <select id="range">
                        <option value="today">Today</option>
                        <option value="daily">Daily (28 days around today)</option>
                        <option value="weekly">Weekly (8 weeks around today)</option>
                        <option value="monthly">Monthly (12 months around today)</option>
                    </select>
                </div>
            </div>

            <div class="chart-row">
                <div id="chart" class="line-chart" aria-live="polite"></div>
                <div id="week-legend" class="week-legend" aria-live="polite" hidden></div>
            </div>
        </div>

    </div>

    <script src="progress.js"></script>
</body>

</html>
